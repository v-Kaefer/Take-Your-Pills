name: Bug Report
description: Relato de defeito encontrado
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary / Resumo
      description: Descreva o problema observado.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / Passos para reproduzir
      description: Informe os passos de forma sequencial.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result / Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Result / Resultado atual
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area / Área
      placeholder: gameplay
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority / Prioridade
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
