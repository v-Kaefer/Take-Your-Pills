name: Epic
description: Planejamento de objetivo macro do projeto
title: "[Epic] "
labels: ["type:epic"]
body:
  - type: markdown
    attributes:
      value: |
        Preencha em português para manter consistência acadêmica.
  - type: textarea
    id: summary
    attributes:
      label: Summary / Resumo
      description: Objetivo geral do épico.
      placeholder: Descreva o resultado esperado deste épico.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria / Critérios de aceitação
      description: Critérios mínimos para considerar o épico concluído.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area / Área
      description: Exemplo: gameplay, ui, art, audio, infra
      placeholder: gameplay
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority / Prioridade
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Dependências
      description: Liste dependências internas/externas.
    validations:
      required: false
