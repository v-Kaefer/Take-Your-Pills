name: Task
description: Tarefa técnica para execução incremental
title: "[Task] "
labels: ["type:task"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary / Resumo
      description: Descreva claramente a tarefa.
    validations:
      required: true
  - type: textarea
    id: done-definition
    attributes:
      label: Definition of Done / Definição de pronto
      description: Condições mínimas para encerrar a task.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area / Área
      placeholder: automation
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority / Prioridade
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent Issue / Issue pai
      placeholder: "#123"
    validations:
      required: false
