name: Feature Request
description: Proposta de funcionalidade nova
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary / Resumo
      description: Explique a funcionalidade proposta.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Contexto
      description: Problema atual e motivação para esta feature.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria / Critérios de aceitação
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area / Área
      placeholder: gameplay
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority / Prioridade
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent Issue / Issue pai
      description: Número da issue pai, se existir.
      placeholder: "#123"
    validations:
      required: false
