name: PR guardrails

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  validate-pr-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Autofill PR metadata from branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -m governance_bootstrap pr autofill \
            --repo "$GITHUB_REPOSITORY" \
            --event-path "$GITHUB_EVENT_PATH" \
            --backlog-file config/stories/backlog-manifest.json

      - name: Validate branch naming and PR metadata
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 scripts/validation/validate_pr_body.py \
            --branch "$HEAD_REF" \
            --base-branch "$BASE_REF" \
            --repo "$REPO_NAME" \
            --pr-number "$PR_NUMBER" \
            --comment
