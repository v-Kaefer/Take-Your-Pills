name: Issue Metadata Check

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: read

jobs:
  validate-issue-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required issue metadata
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((label) => label.name);
            const body = issue.body || "";

            const requiredNamespaces = ["priority:", "type:", "area:"];
            const missingNamespaces = requiredNamespaces.filter(
              (namespace) => !labels.some((name) => name.startsWith(namespace))
            );

            const leaderRegex = /###\s*(Líder funcional|Lider funcional)\s*\n+\s*@?[a-z0-9-]+/i;
            const hasFunctionalLead = leaderRegex.test(body);

            const parentIssueRegex = /###\s*Parent issue\s*\n+\s*#?\d+/i;
            const mentionsSubIssue = /\[sub-issue\]/i.test(issue.title);
            const hasParentIssue = parentIssueRegex.test(body);

            const failures = [];
            if (missingNamespaces.length > 0) {
              failures.push(
                `Missing required label namespace(s): ${missingNamespaces.join(", ")}`
              );
            }

            if (!hasFunctionalLead) {
              failures.push("Missing required field 'Líder funcional'.");
            }

            if (mentionsSubIssue && !hasParentIssue) {
              failures.push("Sub-issue must define 'Parent issue' (#<number>).");
            }

            if (failures.length > 0) {
              core.setFailed(failures.join(" | "));
            }

