name: PR automatic review summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build review summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const changed = files.map(f => `- ${f.filename} (+${f.additions}/-${f.deletions})`).join('\n');
            const body = `## Automated Review Summary\n\n` +
              `- PR: #${pr.number}\n` +
              `- Changed files: ${files.length}\n\n` +
              `### Scope changed\n${changed || '- none'}\n\n` +
              `### Checks required\n- [ ] Branch naming\n- [ ] PR metadata and issue link\n- [ ] Test evidence described\n\n` +
              `### Risk hints\n- Verify cross-impact in game loop, HUD, score, ranking and persistence when applicable.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });
