name: Branch naming validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch pattern
        shell: bash
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|refactor|test|hotfix|phase|task)\/[a-z0-9._/-]+$ ]]; then
            echo "Invalid branch naming. Use e.g. feat/repo-governance-bootstrap or task/phase-1/player-base" >&2
            exit 1
          fi
