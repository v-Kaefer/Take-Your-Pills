name: Commit Message Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Validate commit message format
        uses: actions/github-script@v7
        with:
          script: |
            const allowedPrefix = /^(feat|fix|docs|style|refactor|test|chore|ci)(\(.+\))?:\s.+/;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const invalid = commits.filter((commit) => !allowedPrefix.test(commit.commit.message.split('\n')[0]));
            if (invalid.length > 0) {
              const list = invalid.map((c) => `${c.sha.slice(0,7)}: ${c.commit.message.split('\n')[0]}`).join(' | ');
              core.setFailed(`Invalid commit message(s). Expected Conventional Commit prefix. ${list}`);
            }

