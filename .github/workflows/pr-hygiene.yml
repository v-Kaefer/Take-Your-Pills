---
name: PR hygiene

"on":
  pull_request_target:
    types:
      - ready_for_review
      - converted_to_draft
      - closed
  workflow_run:
    workflows: ["PR guardrails"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  hygiene:
    if: >-
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request_target' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.pull_requests[0].number != null
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base commit for direct PR lifecycle events
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Checkout base branch after PR guardrails
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ github.event.workflow_run.pull_requests[0].base.ref }}
          persist-credentials: false

      - name: Sync PR hygiene
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          GOVERNANCE_PAT: ${{ secrets.GOVERNANCE_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOVERNANCE_PROJECT_NUMBER: ${{ vars.GOVERNANCE_PROJECT_NUMBER }}
        run: |
          python -m governance_bootstrap pr hygiene \
            --repo "$GITHUB_REPOSITORY" \
            --event-path "$GITHUB_EVENT_PATH"
