name: Engine CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  detect-engine:
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect engine stack
        id: detect
        run: |
          if [[ -f "project.godot" ]]; then
            echo "stack=godot" >> "$GITHUB_OUTPUT"
          elif [[ -f "ProjectSettings/ProjectVersion.txt" ]]; then
            echo "stack=unity" >> "$GITHUB_OUTPUT"
          else
            echo "stack=none" >> "$GITHUB_OUTPUT"
          fi

  godot-checks:
    runs-on: ubuntu-latest
    needs: detect-engine
    if: needs.detect-engine.outputs.stack == 'godot'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Godot project file exists and is readable
        run: |
          test -f project.godot
          grep -E 'config_version|application' project.godot > /dev/null

  unity-checks:
    runs-on: ubuntu-latest
    needs: detect-engine
    if: needs.detect-engine.outputs.stack == 'unity'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Unity project metadata
        run: |
          test -f ProjectSettings/ProjectVersion.txt
          grep -E '^m_EditorVersion:' ProjectSettings/ProjectVersion.txt > /dev/null

  no-engine-detected:
    runs-on: ubuntu-latest
    needs: detect-engine
    if: needs.detect-engine.outputs.stack == 'none'
    steps:
      - name: No engine stack detected
        run: echo "No Godot/Unity files found. Skipping engine-specific checks."
