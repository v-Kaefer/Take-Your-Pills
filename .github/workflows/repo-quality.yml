name: Repository Quality

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint-repo-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          npm install -g markdownlint-cli@0.41.0

      - name: Run actionlint
        uses: rhysd/actionlint@v1

      - name: Run yamllint
        run: yamllint .

      - name: Run markdownlint
        run: |
          markdownlint "**/*.md" \
            --ignore node_modules \
            --ignore aplicacao-planejamento-repo2.md \
            --ignore planejamento-repo2-automacoes.md

      - name: Run shellcheck
        run: |
          mapfile -t SH_FILES < <(find . -type f -name "*.sh")
          if [ "${#SH_FILES[@]}" -gt 0 ]; then
            shellcheck "${SH_FILES[@]}"
          else
            echo "No shell scripts found."
          fi
