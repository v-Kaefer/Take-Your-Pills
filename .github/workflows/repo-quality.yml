name: Repository Quality

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint-repo-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          npm install -g markdownlint-cli@0.41.0
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: |
          export PATH="$HOME/go/bin:$PATH"
          actionlint

      - name: Run yamllint
        run: yamllint .

      - name: Run markdownlint
        run: |
          markdownlint "**/*.md" \
            --ignore node_modules \
            --ignore aplicacao-planejamento-repo2.md \
            --ignore planejamento-repo2-automacoes.md

      - name: Run shellcheck
        run: |
          mapfile -t SH_FILES < <(find . -type f -name "*.sh")
          if [ "${#SH_FILES[@]}" -gt 0 ]; then
            shellcheck "${SH_FILES[@]}"
          else
            echo "No shell scripts found."
          fi

      - name: Validate JSON issue manifests
        run: |
          mapfile -t JSON_FILES < <(find config/issues -type f -name "*.json" ! -name "schema.json" | sort)
          if [ "${#JSON_FILES[@]}" -eq 0 ]; then
            echo "No issue manifest json files found."
            exit 0
          fi
          chmod +x scripts/github/create-issue-tree.sh
          for file in "${JSON_FILES[@]}"; do
            echo "Validating $file"
            ./scripts/github/create-issue-tree.sh --file "$file" --schema config/issues/schema.json --validate-only
          done
