---
name: Repository Quality

'on':
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint-repo-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          npm install -g markdownlint-cli@0.41.0
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: |
          export PATH="$HOME/go/bin:$PATH"
          actionlint

      - name: Run yamllint
        run: yamllint .

      - name: Run markdownlint
        run: |
          set -euo pipefail

          mapfile -t RAW_MARKDOWN_FILES < <(
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
              git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- "*.md"
            else
              git diff-tree --no-commit-id --name-only -r HEAD -- "*.md"
            fi
          )

          is_ignored_markdown() {
            local path="$1"
            case "${path}" in
              node_modules/*|\
              aplicacao-planejamento-repo2.md|\
              planejamento-repo2-automacoes.md|\
              pipeline_review_automation_plan.md|\
              take-your-pills_backlog_final.md|\
              take_your_pills_issues_detalhados.md|\
              take_your_pills_project_definitions_update.md)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          MARKDOWN_FILES=()
          for file in "${RAW_MARKDOWN_FILES[@]}"; do
            [[ -z "${file}" ]] && continue
            if is_ignored_markdown "${file}"; then
              continue
            fi
            MARKDOWN_FILES+=("${file}")
          done

          if [ "${#MARKDOWN_FILES[@]}" -eq 0 ]; then
            echo "No changed markdown files to lint."
            exit 0
          fi

          printf "Linting markdown files:\n%s\n" "${MARKDOWN_FILES[@]}"
          markdownlint "${MARKDOWN_FILES[@]}"

      - name: Run shellcheck
        run: |
          mapfile -t SH_FILES < <(find . -type f -name "*.sh")
          if [ "${#SH_FILES[@]}" -gt 0 ]; then
            shellcheck "${SH_FILES[@]}"
          else
            echo "No shell scripts found."
          fi

      - name: Run Python governance tests
        run: |
          python3 -m unittest tests.test_governance_bootstrap

      - name: Check Python syntax
        run: |
          python3 -m compileall \
            governance_bootstrap \
            scripts/github \
            scripts/validation \
            tests

      - name: Run repository tests
        run: |
          target_branch="${GITHUB_BASE_REF:-${GITHUB_REF_NAME:-}}"
          mapfile -t TEST_FILES < <(
            find tests -maxdepth 1 -type f -name "test_*.sh" | sort
          )

          if [ "${#TEST_FILES[@]}" -eq 0 ]; then
            echo "No repository tests found."
            exit 0
          fi

          for test_file in "${TEST_FILES[@]}"; do
            case "$(basename "$test_file")" in
              test_bootstrap_labels.sh)
                if [ "$target_branch" != "main" ]; then
                  echo "Skipping ${test_file} on ${target_branch}"
                  continue
                fi
                ;;
            esac

            echo "Running ${test_file}"
            bash "$test_file"
          done

      - name: Validate JSON issue manifests
        run: |
          mapfile -t JSON_FILES < <(
            find config/issues \
              -type f \
              -name "*.json" \
              ! -name "schema.json" \
              | sort
          )
          if [ "${#JSON_FILES[@]}" -eq 0 ]; then
            echo "No issue manifest json files found."
            exit 0
          fi
          chmod +x scripts/github/create-issue-tree.sh
          for file in "${JSON_FILES[@]}"; do
            echo "Validating $file"
            ./scripts/github/create-issue-tree.sh \
              --file "$file" \
              --schema config/issues/schema.json \
              --validate-only
          done
