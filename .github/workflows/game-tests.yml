---
name: Game tests

"on":
  workflow_run:
    workflows: ["Godot smoke check"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.pull_requests[0].number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-game-changes:
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.pull_requests[0].number != null
      )
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
    steps:
      - name: Detect gameplay changes in associated PR
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_run', 'true');
              return;
            }

            const pr = context.payload.workflow_run.pull_requests?.[0];
            if (!pr) {
              core.setOutput('should_run', 'false');
              core.notice('Skipping game tests: no associated pull request was found.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const patterns = [
              /^project\.godot$/,
              /^scenes\//,
              /^scripts\/run_signals\.gd$/,
              /^tests\/godot\//,
              /^\.github\/workflows\/game-tests\.yml$/,
            ];
            const shouldRun = files.some((file) => patterns.some((pattern) => pattern.test(file.filename)));
            if (!shouldRun) {
              core.notice(`Skipping game tests for PR #${pr.number}: no gameplay paths changed.`);
            }
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

  gdunit:
    needs: detect-game-changes
    if: needs.detect-game-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head from smoke run
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Run GdUnit4 game tests
        uses: godot-gdunit-labs/gdUnit4-action@v1.3.1
        with:
          godot-version: "4.6.2"
          version: "v6.1.3"
          paths: "res://tests/godot"
          timeout: 10
          report-name: gdunit-report.xml
          warnings-as-errors: true
