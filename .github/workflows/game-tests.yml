---
name: Game tests

"on":
  pull_request:
    paths:
      - project.godot
      - scenes/**
      - scripts/run_signals.gd
      - tests/godot/**
      - .github/workflows/game-tests.yml
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  gdunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GdUnit4 game tests
        uses: godot-gdunit-labs/gdUnit4-action@v1.3.1
        with:
          godot-version: "4.6.2"
          version: "v6.1.3"
          paths: "res://tests/godot"
          timeout: 10
          report-name: gdunit-report.xml
          warnings-as-errors: true
